name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: ketanningaale
          outputs: |
            dist/github-snake.svg?color_snake=FF0090&color_dots[0]=0D0008&color_dots[1]=3D0028&color_dots[2]=7A004A&color_dots[3]=CC006B&color_dots[4]=FF0090
            dist/github-snake-dark.svg?palette=github-dark&color_snake=FF0090

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
