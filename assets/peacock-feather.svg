<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 130 420" width="130" height="420">
  <defs>
    <!-- Shaft gradient -->
    <linearGradient id="shaft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7a5c2e"/>
      <stop offset="40%" stop-color="#c8963e"/>
      <stop offset="60%" stop-color="#d4a843"/>
      <stop offset="100%" stop-color="#7a5c2e"/>
    </linearGradient>
    <!-- Eye core gradient -->
    <radialGradient id="eyeCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#05050f"/>
      <stop offset="70%" stop-color="#0a0a22"/>
      <stop offset="100%" stop-color="#0d1030"/>
    </radialGradient>
    <!-- Inner blue gradient -->
    <radialGradient id="eyeBlue" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#2979ff"/>
      <stop offset="60%" stop-color="#1565c0"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </radialGradient>
    <!-- Teal ring gradient -->
    <radialGradient id="eyeTeal" cx="45%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#00bfa5"/>
      <stop offset="100%" stop-color="#00695c"/>
    </radialGradient>
    <!-- Outer green gradient -->
    <radialGradient id="eyeGreen" cx="48%" cy="48%" r="52%">
      <stop offset="0%" stop-color="#2e7d32"/>
      <stop offset="100%" stop-color="#1b5e20"/>
    </radialGradient>
    <!-- Bronze outer ring -->
    <radialGradient id="eyeBronze" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b8881a"/>
      <stop offset="100%" stop-color="#7a5010"/>
    </radialGradient>
    <!-- Barb gradient top -->
    <linearGradient id="barbGreen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#388e3c" stop-opacity="0"/>
      <stop offset="30%" stop-color="#43a047" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#2e7d32" stop-opacity="0.7"/>
    </linearGradient>
  </defs>

  <!-- ═══════════════════════════════════════ -->
  <!--           LOWER BARBS (shaft area)      -->
  <!-- ═══════════════════════════════════════ -->

  <!-- Right barbs, fanning from shaft -->
  <line x1="65" y1="390" x2="72" y2="385" stroke="#a0845c" stroke-width="0.7" opacity="0.25"/>
  <line x1="65" y1="370" x2="74" y2="363" stroke="#a0845c" stroke-width="0.7" opacity="0.28"/>
  <line x1="65" y1="350" x2="76" y2="341" stroke="#8d7044" stroke-width="0.8" opacity="0.32"/>
  <line x1="65" y1="330" x2="79" y2="318" stroke="#7a9040" stroke-width="0.9" opacity="0.36"/>
  <line x1="65" y1="310" x2="82" y2="296" stroke="#6a9e38" stroke-width="1.0" opacity="0.40"/>
  <line x1="65" y1="290" x2="85" y2="274" stroke="#5aad34" stroke-width="1.0" opacity="0.44"/>
  <line x1="65" y1="270" x2="88" y2="252" stroke="#4caf30" stroke-width="1.1" opacity="0.50"/>
  <line x1="65" y1="250" x2="91" y2="230" stroke="#43a02c" stroke-width="1.1" opacity="0.55"/>
  <line x1="65" y1="230" x2="93" y2="208" stroke="#388e28" stroke-width="1.2" opacity="0.58"/>
  <line x1="65" y1="210" x2="94" y2="188" stroke="#2e7d24" stroke-width="1.2" opacity="0.60"/>

  <!-- Left barbs -->
  <line x1="65" y1="390" x2="58" y2="385" stroke="#a0845c" stroke-width="0.7" opacity="0.25"/>
  <line x1="65" y1="370" x2="56" y2="363" stroke="#a0845c" stroke-width="0.7" opacity="0.28"/>
  <line x1="65" y1="350" x2="54" y2="341" stroke="#8d7044" stroke-width="0.8" opacity="0.32"/>
  <line x1="65" y1="330" x2="51" y2="318" stroke="#7a9040" stroke-width="0.9" opacity="0.36"/>
  <line x1="65" y1="310" x2="48" y2="296" stroke="#6a9e38" stroke-width="1.0" opacity="0.40"/>
  <line x1="65" y1="290" x2="45" y2="274" stroke="#5aad34" stroke-width="1.0" opacity="0.44"/>
  <line x1="65" y1="270" x2="42" y2="252" stroke="#4caf30" stroke-width="1.1" opacity="0.50"/>
  <line x1="65" y1="250" x2="39" y2="230" stroke="#43a02c" stroke-width="1.1" opacity="0.55"/>
  <line x1="65" y1="230" x2="37" y2="208" stroke="#388e28" stroke-width="1.2" opacity="0.58"/>
  <line x1="65" y1="210" x2="36" y2="188" stroke="#2e7d24" stroke-width="1.2" opacity="0.60"/>

  <!-- ═══════════════════════════════════════ -->
  <!--        UPPER BARB FAN (around eye)      -->
  <!-- ═══════════════════════════════════════ -->

  <!-- Right fan barbs (radiating outward around eye) -->
  <path d="M65,185 Q82,172 95,155" stroke="#388e3c" stroke-width="1.3" fill="none" opacity="0.65"/>
  <path d="M65,185 Q85,165 102,142" stroke="#2e7d32" stroke-width="1.2" fill="none" opacity="0.60"/>
  <path d="M65,185 Q88,158 108,130" stroke="#1b5e20" stroke-width="1.1" fill="none" opacity="0.55"/>
  <path d="M65,185 Q90,150 112,120" stroke="#1b5e20" stroke-width="1.0" fill="none" opacity="0.50"/>
  <path d="M65,185 Q90,142 112,108" stroke="#1b5e20" stroke-width="0.9" fill="none" opacity="0.42"/>
  <path d="M65,185 Q88,135 108,98"  stroke="#2e7d32" stroke-width="0.9" fill="none" opacity="0.38"/>
  <path d="M65,185 Q84,128 100,90"  stroke="#388e3c" stroke-width="0.8" fill="none" opacity="0.35"/>
  <path d="M65,185 Q80,122 92,83"   stroke="#43a047" stroke-width="0.8" fill="none" opacity="0.30"/>
  <path d="M65,185 Q74,118 82,76"   stroke="#4caf50" stroke-width="0.7" fill="none" opacity="0.26"/>
  <path d="M65,185 Q68,115 68,68"   stroke="#4caf50" stroke-width="0.7" fill="none" opacity="0.22"/>

  <!-- Left fan barbs -->
  <path d="M65,185 Q48,172 35,155" stroke="#388e3c" stroke-width="1.3" fill="none" opacity="0.65"/>
  <path d="M65,185 Q45,165 28,142" stroke="#2e7d32" stroke-width="1.2" fill="none" opacity="0.60"/>
  <path d="M65,185 Q42,158 22,130" stroke="#1b5e20" stroke-width="1.1" fill="none" opacity="0.55"/>
  <path d="M65,185 Q40,150 18,120" stroke="#1b5e20" stroke-width="1.0" fill="none" opacity="0.50"/>
  <path d="M65,185 Q40,142 18,108" stroke="#1b5e20" stroke-width="0.9" fill="none" opacity="0.42"/>
  <path d="M65,185 Q42,135 22,98"  stroke="#2e7d32" stroke-width="0.9" fill="none" opacity="0.38"/>
  <path d="M65,185 Q46,128 30,90"  stroke="#388e3c" stroke-width="0.8" fill="none" opacity="0.35"/>
  <path d="M65,185 Q50,122 38,83"  stroke="#43a047" stroke-width="0.8" fill="none" opacity="0.30"/>
  <path d="M65,185 Q56,118 48,76"  stroke="#4caf50" stroke-width="0.7" fill="none" opacity="0.26"/>
  <path d="M65,185 Q62,115 62,68"  stroke="#4caf50" stroke-width="0.7" fill="none" opacity="0.22"/>

  <!-- ═══════════════════════════════════════ -->
  <!--              EYE / OCELLUS              -->
  <!-- ═══════════════════════════════════════ -->

  <!-- Outermost halo — soft bronze glow -->
  <ellipse cx="65" cy="115" rx="42" ry="54" fill="#7a5010" opacity="0.18"/>

  <!-- Bronze outer ring -->
  <ellipse cx="65" cy="115" rx="36" ry="46" fill="url(#eyeBronze)" opacity="0.85"/>

  <!-- Dark border between bronze and green -->
  <ellipse cx="65" cy="115" rx="32" ry="41" fill="#0d1a0e"/>

  <!-- Outer green -->
  <ellipse cx="65" cy="115" rx="30" ry="39" fill="url(#eyeGreen)"/>

  <!-- Teal / blue-green ring -->
  <ellipse cx="65" cy="115" rx="22" ry="29" fill="url(#eyeTeal)"/>

  <!-- Blue iris -->
  <ellipse cx="65" cy="115" rx="15" ry="20" fill="url(#eyeBlue)"/>

  <!-- Dark pupil -->
  <ellipse cx="65" cy="115" rx="8" ry="11" fill="url(#eyeCore)"/>

  <!-- Specular highlight on pupil -->
  <ellipse cx="61" cy="111" rx="2.5" ry="3" fill="rgba(255,255,255,0.22)"/>

  <!-- Iridescent shimmer lines on barbs near eye -->
  <path d="M65,155 Q82,148 95,138" stroke="#80cbc4" stroke-width="0.6" fill="none" opacity="0.35"/>
  <path d="M65,155 Q48,148 35,138" stroke="#80cbc4" stroke-width="0.6" fill="none" opacity="0.35"/>
  <path d="M65,155 Q84,142 100,128" stroke="#4fc3f7" stroke-width="0.5" fill="none" opacity="0.25"/>
  <path d="M65,155 Q46,142 30,128" stroke="#4fc3f7" stroke-width="0.5" fill="none" opacity="0.25"/>

  <!-- ═══════════════════════════════════════ -->
  <!--                  SHAFT                  -->
  <!-- ═══════════════════════════════════════ -->

  <path d="M65,415 Q65,380 65,340 Q65,300 65,260 Q65,230 65,200 Q65,175 65,155 Q65,135 65,115"
        stroke="url(#shaft)" stroke-width="2.2" fill="none" stroke-linecap="round"/>

  <!-- Tip above eye -->
  <path d="M65,115 Q65,95 65,75 Q65,62 66,52"
        stroke="#a07840" stroke-width="1.4" fill="none" stroke-linecap="round" opacity="0.8"/>

  <!-- Feather tip -->
  <path d="M64,52 Q65,42 66,52" stroke="#8d6a30" stroke-width="1.0" fill="none" stroke-linecap="round" opacity="0.6"/>
  <ellipse cx="65" cy="44" rx="2" ry="5" fill="#7a5c28" opacity="0.5"/>
</svg>
