<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 160" width="460" height="160">
  <defs>
    <!-- Shaft gradient (horizontal) -->
    <linearGradient id="shaft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#7a5c2e" stop-opacity="0.4"/>
      <stop offset="30%"  stop-color="#a07830"/>
      <stop offset="55%"  stop-color="#d4a843"/>
      <stop offset="75%"  stop-color="#c8963e"/>
      <stop offset="100%" stop-color="#7a5c2e"/>
    </linearGradient>
    <!-- Eye gradients -->
    <radialGradient id="eyeBronze" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#c8a030"/>
      <stop offset="100%" stop-color="#7a5010"/>
    </radialGradient>
    <radialGradient id="eyeGreen" cx="48%" cy="48%" r="52%">
      <stop offset="0%"   stop-color="#2e7d32"/>
      <stop offset="100%" stop-color="#1b5e20"/>
    </radialGradient>
    <radialGradient id="eyeTeal" cx="45%" cy="45%" r="55%">
      <stop offset="0%"   stop-color="#00bfa5"/>
      <stop offset="100%" stop-color="#00695c"/>
    </radialGradient>
    <radialGradient id="eyeBlue" cx="40%" cy="40%" r="60%">
      <stop offset="0%"   stop-color="#2979ff"/>
      <stop offset="60%"  stop-color="#1565c0"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </radialGradient>
    <radialGradient id="eyeCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#05050f"/>
      <stop offset="100%" stop-color="#0d1030"/>
    </radialGradient>
  </defs>

  <!-- ═══════════════════════════════════════════════ -->
  <!--   SHAFT BARBS — left (base) side, short + faint -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- Top barbs along shaft (left portion) -->
  <line x1="40"  y1="80" x2="40"  y2="72" stroke="#8d7040" stroke-width="0.8" opacity="0.22"/>
  <line x1="60"  y1="80" x2="60"  y2="70" stroke="#8d7040" stroke-width="0.8" opacity="0.26"/>
  <line x1="80"  y1="80" x2="80"  y2="68" stroke="#7a9040" stroke-width="0.9" opacity="0.30"/>
  <line x1="100" y1="80" x2="100" y2="66" stroke="#6a9e38" stroke-width="0.9" opacity="0.34"/>
  <line x1="120" y1="80" x2="120" y2="63" stroke="#5aad34" stroke-width="1.0" opacity="0.38"/>
  <line x1="140" y1="80" x2="140" y2="60" stroke="#4caf30" stroke-width="1.0" opacity="0.42"/>
  <line x1="160" y1="80" x2="160" y2="57" stroke="#43a02c" stroke-width="1.1" opacity="0.46"/>
  <line x1="180" y1="80" x2="180" y2="54" stroke="#388e28" stroke-width="1.1" opacity="0.50"/>
  <line x1="200" y1="80" x2="200" y2="51" stroke="#2e7d24" stroke-width="1.2" opacity="0.54"/>
  <line x1="220" y1="80" x2="220" y2="48" stroke="#256620" stroke-width="1.2" opacity="0.56"/>

  <!-- Bottom barbs along shaft (left portion) -->
  <line x1="40"  y1="80" x2="40"  y2="88" stroke="#8d7040" stroke-width="0.8" opacity="0.22"/>
  <line x1="60"  y1="80" x2="60"  y2="90" stroke="#8d7040" stroke-width="0.8" opacity="0.26"/>
  <line x1="80"  y1="80" x2="80"  y2="92" stroke="#7a9040" stroke-width="0.9" opacity="0.30"/>
  <line x1="100" y1="80" x2="100" y2="94" stroke="#6a9e38" stroke-width="0.9" opacity="0.34"/>
  <line x1="120" y1="80" x2="120" y2="97" stroke="#5aad34" stroke-width="1.0" opacity="0.38"/>
  <line x1="140" y1="80" x2="140" y2="100" stroke="#4caf30" stroke-width="1.0" opacity="0.42"/>
  <line x1="160" y1="80" x2="160" y2="103" stroke="#43a02c" stroke-width="1.1" opacity="0.46"/>
  <line x1="180" y1="80" x2="180" y2="106" stroke="#388e28" stroke-width="1.1" opacity="0.50"/>
  <line x1="200" y1="80" x2="200" y2="109" stroke="#2e7d24" stroke-width="1.2" opacity="0.54"/>
  <line x1="220" y1="80" x2="220" y2="112" stroke="#256620" stroke-width="1.2" opacity="0.56"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!--   FAN BARBS — radiating around the eye          -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- Top fan barbs (curving upward and right) -->
  <path d="M240,80 Q255,65 268,52" stroke="#388e3c" stroke-width="1.2" fill="none" opacity="0.60"/>
  <path d="M240,80 Q260,60 278,44" stroke="#2e7d32" stroke-width="1.1" fill="none" opacity="0.55"/>
  <path d="M240,80 Q264,54 288,38" stroke="#1b5e20" stroke-width="1.0" fill="none" opacity="0.50"/>
  <path d="M240,80 Q270,49 298,34" stroke="#1b5e20" stroke-width="0.9" fill="none" opacity="0.44"/>
  <path d="M240,80 Q276,46 310,30" stroke="#256620" stroke-width="0.9" fill="none" opacity="0.40"/>
  <path d="M240,80 Q284,44 322,28" stroke="#2e7d32" stroke-width="0.8" fill="none" opacity="0.36"/>
  <path d="M240,80 Q292,43 336,28" stroke="#388e3c" stroke-width="0.8" fill="none" opacity="0.32"/>
  <path d="M240,80 Q300,44 350,30" stroke="#43a047" stroke-width="0.7" fill="none" opacity="0.28"/>
  <path d="M240,80 Q308,46 362,34" stroke="#4caf50" stroke-width="0.7" fill="none" opacity="0.24"/>
  <path d="M240,80 Q318,50 378,42" stroke="#4caf50" stroke-width="0.6" fill="none" opacity="0.20"/>

  <!-- Bottom fan barbs (curving downward and right) -->
  <path d="M240,80 Q255,95 268,108" stroke="#388e3c" stroke-width="1.2" fill="none" opacity="0.60"/>
  <path d="M240,80 Q260,100 278,116" stroke="#2e7d32" stroke-width="1.1" fill="none" opacity="0.55"/>
  <path d="M240,80 Q264,106 288,122" stroke="#1b5e20" stroke-width="1.0" fill="none" opacity="0.50"/>
  <path d="M240,80 Q270,111 298,126" stroke="#1b5e20" stroke-width="0.9" fill="none" opacity="0.44"/>
  <path d="M240,80 Q276,114 310,130" stroke="#256620" stroke-width="0.9" fill="none" opacity="0.40"/>
  <path d="M240,80 Q284,116 322,132" stroke="#2e7d32" stroke-width="0.8" fill="none" opacity="0.36"/>
  <path d="M240,80 Q292,117 336,132" stroke="#388e3c" stroke-width="0.8" fill="none" opacity="0.32"/>
  <path d="M240,80 Q300,116 350,130" stroke="#43a047" stroke-width="0.7" fill="none" opacity="0.28"/>
  <path d="M240,80 Q308,114 362,126" stroke="#4caf50" stroke-width="0.7" fill="none" opacity="0.24"/>
  <path d="M240,80 Q318,110 378,118" stroke="#4caf50" stroke-width="0.6" fill="none" opacity="0.20"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!--                  EYE / OCELLUS                  -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- Soft halo -->
  <ellipse cx="310" cy="80" rx="54" ry="40" fill="#7a5010" opacity="0.14"/>

  <!-- Bronze outer ring -->
  <ellipse cx="310" cy="80" rx="46" ry="34" fill="url(#eyeBronze)" opacity="0.88"/>

  <!-- Dark border -->
  <ellipse cx="310" cy="80" rx="41" ry="30" fill="#0d1a0e"/>

  <!-- Outer green -->
  <ellipse cx="310" cy="80" rx="39" ry="28" fill="url(#eyeGreen)"/>

  <!-- Teal ring -->
  <ellipse cx="310" cy="80" rx="28" ry="20" fill="url(#eyeTeal)"/>

  <!-- Blue iris -->
  <ellipse cx="310" cy="80" rx="20" ry="14" fill="url(#eyeBlue)"/>

  <!-- Dark pupil -->
  <ellipse cx="310" cy="80" rx="11" ry="8"  fill="url(#eyeCore)"/>

  <!-- Specular highlight -->
  <ellipse cx="306" cy="76" rx="3"  ry="2"  fill="rgba(255,255,255,0.22)"/>

  <!-- Iridescent shimmer near eye -->
  <path d="M268,60 Q290,52 310,46" stroke="#80cbc4" stroke-width="0.6" fill="none" opacity="0.30"/>
  <path d="M268,100 Q290,108 310,114" stroke="#80cbc4" stroke-width="0.6" fill="none" opacity="0.30"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!--                     SHAFT                       -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- Main horizontal shaft -->
  <path d="M20,80 Q80,80 140,80 Q200,80 240,80 Q270,80 300,80"
        stroke="url(#shaft)" stroke-width="2.2" fill="none" stroke-linecap="round"/>

  <!-- Shaft through eye to tip -->
  <path d="M300,80 Q340,80 380,80 Q400,80 420,80 Q435,80 448,80"
        stroke="#a07830" stroke-width="1.6" fill="none" stroke-linecap="round" opacity="0.75"/>

  <!-- Feather tip -->
  <path d="M448,80 Q455,78 458,80 Q455,82 448,80"
        stroke="#7a5c28" stroke-width="1.0" fill="#9a7030" opacity="0.55"/>
  <ellipse cx="456" cy="80" rx="5" ry="2" fill="#7a5c28" opacity="0.45"/>
</svg>
